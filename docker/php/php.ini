; ─── Larable Development PHP Overrides ──────────────────────────────────

[PHP]
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

memory_limit = 512M
max_execution_time = 300
max_input_time = 300
post_max_size = 100M
upload_max_filesize = 100M

[Date]
date.timezone = UTC

[opcache]
opcache.enable = 0
opcache.enable_cli = 0
