
services:
  # ─── Laravel Backend (PHP-FPM) ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: larable-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      pgsql:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ${APP_NAME:-Larable}
      DB_USERNAME: larable
      DB_PASSWORD: larable
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - larable
    healthcheck:
      test: ["CMD", "php", "artisan", "about"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Nginx Web Server (Development proxy) ───────────────────────────
  web:
    image: nginx:alpine
    container_name: larable-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - larable

  # ─── React TypeScript Frontend (Vite Dev Server) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: larable-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ""
      BACKEND_URL: http://web:80
    depends_on:
      - app
      - web
    networks:
      - larable

  # ─── DNSMasq (Local wildcard DNS) ───────────────────────────────────
  dnsmasq:
    image: jpillora/dnsmasq:latest
    container_name: larable-dnsmasq
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./docker/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf
    networks:
      - larable

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────
  pgsql:
    image: postgres:16-alpine
    container_name: larable-pgsql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${APP_NAME:-Larable}
      POSTGRES_USER: larable
      POSTGRES_PASSWORD: larable
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U larable -d ${APP_NAME:-Larable}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - larable

  # ─── Mailpit (Email Testing) ────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: larable-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - larable

  # ─── Redis (Caching, Sessions, Queues) ────────────────────────────────
  redis:
    image: redis:alpine
    container_name: larable-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - larable

volumes:
  pgsql_data:
    driver: local

networks:
  larable:
    driver: bridge
